name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release package
        run: |
          mkdir -p release/subscription-cleaner

          # 复制构建产物
          cp -r dist release/subscription-cleaner/

          # 复制 package.json 和 lock 文件（用于服务器安装依赖）
          cp package.json pnpm-lock.yaml release/subscription-cleaner/

          # 复制配置文件示例
          cp .env.example release/subscription-cleaner/
          cp -r resources release/subscription-cleaner/

          # 复制工具脚本
          cp -r tools release/subscription-cleaner/

          # 创建 README
          cat > release/subscription-cleaner/README.txt << 'EOF'
          Subscription Cleaner 订阅清洗服务
          ===================================

          快速开始（systemd 部署）：
          1. 查看 tools/deploy.sh 部署脚本
          2. 运行部署脚本自动安装并配置
          3. 修改 .env 和 resources/sources.yaml
          4. 启动服务

          手动运行：
          1. 复制 .env.example 为 .env，修改配置
          2. 复制 resources/sources.yaml.example 为 resources/sources.yaml
          3. node dist/index.js

          详细文档请查看项目仓库。
          EOF

          # 打包应用
          cd release
          tar -czf subscription-cleaner-${{ github.ref_name }}.tar.gz subscription-cleaner

          # 单独复制 deploy.sh 方便直接下载
          cp subscription-cleaner/tools/deploy.sh deploy.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/subscription-cleaner-${{ github.ref_name }}.tar.gz
            release/deploy.sh
          generate_release_notes: true
